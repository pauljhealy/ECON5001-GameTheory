name: Build Lecture PDFs and Index

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Timezone for \today / \DTMcurrenttime on the compiled slides
      # (replaces the old root-level latexmkrc).
      TZ: America/New_York
    permissions:
      contents: write   # needed to commit compiled PDFs back to the repo
      pages: write
      id-token: write

    steps:
      # 1️⃣ Checkout repository
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Download previously built PDFs
      - name: Download previously built PDFs
        run: |
          mkdir -p public
          # Durable source of prior PDFs: the committed PDFs/ folder on main.
          cp PDFs/*.pdf public/ 2>/dev/null || true
          # Fetch PDFs from the current gh-pages branch
          git fetch origin gh-pages || true
          git checkout origin/gh-pages -- . || true
          mv *.pdf public/ 2>/dev/null || true
          git checkout main -- .

      # 2️⃣ Find all standalone .tex files in LectureSlides
      - name: Find changed lecture .tex files
        run: |
          mkdir -p build
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            # No previous commit — recompile everything
            find LectureSlides -maxdepth 1 -name "*.tex" \
              ! -path "LectureSlides/includes/*" | sort > texfiles.txt
            find Syllabus -maxdepth 1 -name "syllabus.tex" > syllabuspath.txt
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — recompile everything
            find LectureSlides -maxdepth 1 -name "*.tex" \
              ! -path "LectureSlides/includes/*" | sort > texfiles.txt
            find Syllabus -maxdepth 1 -name "syllabus.tex" > syllabuspath.txt
          else
            git diff --name-only HEAD~1 HEAD -- 'LectureSlides/*.tex' \
              | grep -v 'includes/' | sort > texfiles.txt
            git diff --name-only HEAD~1 HEAD -- 'Syllabus/syllabus.tex' \
              > syllabuspath.txt
          fi
          echo "Files to compile:"
          cat texfiles.txt
          cat syllabuspath.txt

      # 2.5 Cache LaTeX packages
      - name: Cache LaTeX packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: latex-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            latex-${{ runner.os }}-

      # 2.6 Cache latexmk build artifacts
      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          path: build
          key: latexmk-${{ runner.os }}-${{ hashFiles('LectureSlides/*.tex', 'Syllabus/syllabus.tex') }}
          restore-keys: |
            latexmk-${{ runner.os }}-

      # 3️⃣ Compile each .tex into a PDF
      - name: Compile lecture PDFs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-upgrade texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-games texlive-pstricks texlive-pictures texlive-science texlive-bibtex-extra latexmk poppler-utils gnuplot

          while IFS= read -r texfile; do
            echo "Compiling $texfile ..."
            latexmk -pdf -shell-escape -interaction=nonstopmode -halt-on-error -outdir=build "$texfile"
          done < texfiles.txt

          while IFS= read -r texfile; do
            echo "Compiling $texfile ..."
            latexmk -pdf -interaction=nonstopmode -halt-on-error -outdir=build "$texfile"
          done < syllabuspath.txt

      # 4️⃣ Copy PDFs to public/
      - name: Collect PDFs
        run: |
          mkdir -p public
          cp build/*.pdf public/ 2>/dev/null || true

      # 4.4 Prune PDFs whose source deck no longer exists (renamed/deleted), so
      #     they drop out of the site, the index, and PDFs/. Without this, the
      #     build cache and the PDFs/ restore re-introduce a stale deck forever.
      - name: Prune stale PDFs
        run: |
          : > valid.txt
          for t in LectureSlides/*.tex; do
            [ -e "$t" ] || continue
            echo "$(basename "${t%.tex}").pdf" >> valid.txt
          done
          [ -f Syllabus/syllabus.tex ] && echo "syllabus.pdf" >> valid.txt
          echo "Valid PDFs:"; cat valid.txt
          for f in public/*.pdf; do
            [ -e "$f" ] || continue
            bn=$(basename "$f")
            grep -qxF "$bn" valid.txt || { echo "Pruning stale $bn"; rm -f "$f"; }
          done

      # 4.5 Commit the clean compiled PDFs to main so they sync to clones via
      #     `git pull`. Runs before annotated PDFs are added to public/, so the
      #     PDFs/ folder holds only the compiled decks. continue-on-error keeps a
      #     transient push race from blocking the Pages deploy. A GITHUB_TOKEN
      #     push does not retrigger this workflow; [skip ci] is a backstop.
      - name: Commit compiled PDFs to repo
        continue-on-error: true
        run: |
          mkdir -p PDFs
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Mirror PDFs/ to the current valid set: drop decks no longer present
          # in public/ (pruned above), then copy the live ones in.
          sync_pdfs() {
            for f in PDFs/*.pdf; do
              [ -e "$f" ] || continue
              bn=$(basename "$f")
              [ -e "public/$bn" ] || rm -f "$f"
            done
            cp public/*.pdf PDFs/ 2>/dev/null || true
          }
          sync_pdfs
          git add -A PDFs
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi
          git commit -m "Update compiled slide PDFs [skip ci]"
          # Push with retry: a concurrent build or Overleaf push may have moved
          # main. Re-apply our mirror onto the latest tip and try again, so a
          # race never silently drops the PDF update.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push rejected (attempt $attempt); integrating origin/main..."
            git fetch origin main
            git reset --soft origin/main
            sync_pdfs
            git add -A PDFs
            if git diff --cached --quiet; then echo "Nothing to commit after integrate."; exit 0; fi
            git commit -m "Update compiled slide PDFs [skip ci]"
            sleep 4
          done
          echo "Could not push PDF update after retries (non-fatal)."

      # 5️⃣ Generate index.html from PDF titles
      - name: Generate index.html
        run: |
          pdf_count=$(find public -name "*.pdf" | wc -l)
          echo "Found $pdf_count PDFs in public/"
          if [ "$pdf_count" -eq 0 ]; then
            echo "ERROR: No PDFs found in public/!" && exit 1
          fi
          cat HTML/topstuff.html > public/index.html

          for f in public/*.pdf; do
            filename=$(basename "$f")
            if [ "$filename" = "syllabus.pdf" ]; then
              continue
            fi

            base="${filename%.pdf}"
            texfile="LectureSlides/$base.tex"

            REPO_URL="https://github.com/pauljhealy/ECON5001-GameTheory"
            BRANCH="main"

            tex_url="$REPO_URL/blob/$BRANCH/LectureSlides/$base.tex"

            raw_title=$(pdfinfo "$f" \
              | awk '/^Title:/ {flag=1; sub(/^Title:[[:space:]]*/, ""); print; next}
                     /^[[:space:]]/ && flag {print}
                     !/^[[:space:]]/ && flag {exit}')

            # Normalize
            title=$(printf "%s" "$raw_title" \
              | tr '\n' ' ' \
              | sed 's/\\\\/ /g' \
              | sed 's/[[:space:]]\+/ /g' \
              | sed 's/^ *//; s/ *$//')

            # Fallback to filename if empty
            if [ -z "$title" ]; then
              title=$(basename "$f" .pdf)
            fi

            # Get last commit date for this .tex file
            last_updated=$(git log -1 --format="%as" -- "$texfile")
            last_updated_string="(updated $last_updated)"
            if [ -z "$last_updated" ]; then
              last_updated="unknown"
              last_updated_string=""
            fi

            # Build the metadata line: updated date (if known) + source link
            if [ -n "$last_updated" ]; then
              meta="Updated $last_updated &middot; <a href=\"$tex_url\" target=\"_blank\" rel=\"noopener\">Source</a>"
            else
              meta="<a href=\"$tex_url\" target=\"_blank\" rel=\"noopener\">Source</a>"
            fi

            # Instructor's in-class annotated PDF, if one has been uploaded to
            # Annotated/<base>_PJH.pdf. Copy it into public/ and surface a
            # prominent download link under the lecture.
            annot_file="Annotated/${base}_PJH.pdf"
            annot_link=""
            if [ -f "$annot_file" ]; then
              cp "$annot_file" public/
              annot_link="<a class=\"lect-annot\" href=\"${base}_PJH.pdf\" target=\"_blank\" rel=\"noopener\">&#x270E; Prof. Healy's Annotated Version</a>"
            fi

            echo "<li>" >> public/index.html
            echo "<a class=\"lect-title\" href=\"$filename\" target=\"_blank\" rel=\"noopener\">$title</a>" >> public/index.html
            echo "<div class=\"lect-meta\">$meta</div>" >> public/index.html
            if [ -n "$annot_link" ]; then
              echo "$annot_link" >> public/index.html
            fi
            echo "</li>" >> public/index.html
          done

          echo "</ol>" >> public/index.html
          echo "</body></html>" >> public/index.html

      # 6️⃣ Deploy to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
