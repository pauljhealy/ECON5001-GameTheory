<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index,nofollow">
<title>ECON 5001: Game Theory &mdash; Lecture Slides</title>

<!-- Match CarmenCanvas: Lato body font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --osu-scarlet:    #BB0000;
    --canvas-text:    #2D3B45;  /* Canvas dark font */
    --canvas-muted:   #6B7780;
    --canvas-border:  #E1E4E8;
    --canvas-hover:   #F5F6F7;
  }
  * { box-sizing: border-box; }
  html, body { background: transparent; }
  body {
    margin: 0;
    padding: 16px;
    font-family: "Lato", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--canvas-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .page-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 10px 0;
  }
  .accent-bar {
    height: 4px;
    width: 56px;
    background: var(--osu-scarlet);
    border-radius: 2px;
    margin: 0 0 22px 0;
  }

  ol.lectures {
    list-style: none;
    counter-reset: lect;
    margin: 0;
    padding: 0;
  }
  ol.lectures > li {
    counter-increment: lect;
    position: relative;
    padding: 14px 16px 14px 58px;
    border: 1px solid var(--canvas-border);
    border-radius: 8px;
    margin-bottom: 10px;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  ol.lectures > li:hover {
    background: var(--canvas-hover);
    border-color: var(--osu-scarlet);
  }
  ol.lectures > li::before {
    content: counter(lect);
    position: absolute;
    left: 14px;
    top: 13px;
    width: 30px;
    height: 30px;
    background: var(--osu-scarlet);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  a.lect-title {
    display: inline-block;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--canvas-text);
    text-decoration: none;
  }
  ol.lectures > li:hover a.lect-title { color: var(--osu-scarlet); }
  a.lect-title:focus { outline: 2px solid var(--osu-scarlet); outline-offset: 3px; }

  .lect-meta {
    margin-top: 3px;
    font-size: 0.82rem;
    color: var(--canvas-muted);
  }
  .lect-meta a {
    color: var(--canvas-muted);
    text-decoration: underline;
  }
  .lect-meta a:hover { color: var(--osu-scarlet); }

  .empty {
    color: var(--canvas-muted);
    font-style: italic;
  }
</style>
</head>

<body>
  <h1 class="page-title">Lecture Slides</h1>
  <div class="accent-bar"></div>

  <ol class="lectures">
